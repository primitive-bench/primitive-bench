name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Schema contract guard
        # Fail the build if bench-schemas changed without a SCHEMA_VERSION bump.
        run: |
          if git diff --name-only origin/main...HEAD | grep -q 'bench-schemas/src'; then
            git diff origin/main...HEAD -- packages/bench-schemas/src/bench_schemas/models.py \
              | grep -q 'SCHEMA_VERSION' \
              || (echo "::error::bench-schemas changed but SCHEMA_VERSION was not bumped (see DECISIONS.md D-03)" && exit 1)
          fi

      - name: Test
        run: uv run pytest -q

      - name: MCP data + schema drift guard
        run: |
          uv run bench results emit
          uv run bench results schema
          git diff --exit-code -- data/results apps/mcp/data apps/mcp/types/bench-report.schema.json

  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mcp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/mcp/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type drift guard (JSON Schema -> TS types)
        run: pnpm run check:types

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test
