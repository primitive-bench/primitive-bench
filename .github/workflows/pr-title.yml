name: pr-title

# Since we squash-merge, the PR title becomes the commit on main — so it must
# follow Conventional Commits. This validates the title (not individual commits).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            build
            refactor
            perf
            test
            style
            revert
