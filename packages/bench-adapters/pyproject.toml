[project]
name = "bench-adapters"
version = "0.1.0"
description = "Provider/primitive adapter SDK for Primitive Bench"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["bench-schemas", "httpx>=0.27"]

# Local bi-encoder retrieval adapters (bge-small, e5-small) need
# sentence-transformers. Optional so the hosted-API adapters stay lightweight;
# eval-retrieval pulls this in for a ready-to-run local baseline.
[project.optional-dependencies]
local-retrieval = ["sentence-transformers>=3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench_adapters"]
