[project]
name = "eval-crawl"
version = "0.1.0"
description = "Primitive Bench eval vertical: Crawl — site coverage & freshness over seed crawls"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "bench-schemas",
    "bench-core",
    "bench-stats",
    "bench-adapters",
    "pyyaml",
    # The keyless local crawler + the live golden-set builder use httpx + selectolax
    # (both already transitive via bench-core; pinned here as direct deps).
    "httpx>=0.27",
    "selectolax>=0.3",
]

[project.scripts]
eval-crawl = "eval_crawl.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_crawl"]
