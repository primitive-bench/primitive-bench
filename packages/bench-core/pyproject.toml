[project]
name = "bench-core"
version = "0.1.0"
description = "Harness engine for Primitive Bench"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "bench-schemas",
    "httpx[http2]>=0.27",        # async HTTP client (registry pump + liveness fetch)
    "selectolax>=0.3.21",        # fast HTML main-content extraction for truth-token checks
    "w3lib>=2.1",                # URL canonicalization (from the Scrapy project)
    "tldextract>=5.2",           # registrable-domain extraction
    "python-dotenv>=1.0",        # .env loading for Settings
    "pydantic>=2.8",
    "pydantic-settings>=2.14.2",    # env-backed typed config
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench_core"]
